<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Produtos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Cabeçalho -->
  <header>
    <div class="logo">
      <img src="logo.png" alt="Logo Restaurante">
      <h1>Churrascaria Querência</h1>
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Início</a></li>
        <li><a href="produtos.html">Produtos</a></li>
        <li><a href="#">Mesas</a></li>
        <li><a href="#">Pedidos</a></li>
        <li><a href="#">Relatórios</a></li>
      </ul>
    </nav>
  </header>

  <!-- Área de cadastro de produtos -->
  <section class="cadastro">
    <h2>Cadastro de Produtos</h2>
    <form class="form-cadastro">
      <label for="nome">Nome do Produto:</label>
      <input type="text" id="nome" name="nome" placeholder="Ex: Picanha">

      <label for="preco">Preço:</label>
      <input type="number" id="preco" name="preco" placeholder="Ex: 49.90">

      <label for="categoria">Categoria:</label>
      <select id="categoria" name="categoria">
        <option value="carnes">Carnes</option>
        <option value="bebidas">Bebidas</option>
        <option value="sobremesas">Sobremesas</option>
      </select>

      <button type="submit">Cadastrar Produto</button>
    </form>

    <!-- Lista de produtos -->
    <div class="lista-produtos">
      <h3>Produtos Cadastrados</h3>
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Preço</th>
            <th>Categoria</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Picanha</td>
            <td>49.90</td>
            <td>Carnes</td>
            <td>
              <button class="editar">Editar</button>
              <button class="excluir">Excluir</button>
            </td>
          </tr>
          <tr>
            <td>Guaraná</td>
            <td>6.00</td>
            <td>Bebidas</td>
            <td>
              <button class="editar">Editar</button>
              <button class="excluir">Excluir</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

  <!-- Rodapé -->
  <footer>
    <p>&copy; 2026 - Sistema de Controle de Restaurante | Cristian & João</p>
  </footer>
</body>
</html>
