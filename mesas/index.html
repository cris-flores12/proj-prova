<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesas | Churrascaria Querência</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .page-content {
      max-width: 1400px;
      margin: 80px auto 40px;
      padding: 0 20px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 50px;
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      color: var(--gold);
      margin: 0;
      text-shadow: 0 0 20px rgba(200, 155, 60, 0.3);
    }

    .page-header p {
      color: var(--text-secondary);
      margin-top: 10px;
    }

    .form-container {
      background: linear-gradient(135deg, var(--black-secondary) 0%, rgba(15, 15, 15, 0.8) 100%);
      border: 1px solid var(--gold);
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 40px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    .form-container h2 {
      color: var(--gold);
      font-family: 'Cinzel', serif;
      margin-top: 0;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .form-group input,
    .form-group select {
      background: var(--black-primary);
      border: 1px solid rgba(200, 155, 60, 0.3);
      color: var(--text-primary);
      padding: 10px 12px;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 10px rgba(200, 155, 60, 0.2);
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold) 0%, #d4a844 100%);
      color: var(--black-primary);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(200, 155, 60, 0.4);
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
    }

    .btn-secondary:hover {
      background: rgba(200, 155, 60, 0.1);
    }

    .table-container {
      background: linear-gradient(135deg, var(--black-secondary) 0%, rgba(15, 15, 15, 0.8) 100%);
      border: 1px solid var(--gold);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    .table-header {
      background: rgba(200, 155, 60, 0.1);
      border-bottom: 2px solid var(--gold);
      padding: 20px 30px;
    }

    .table-header h2 {
      color: var(--gold);
      font-family: 'Cinzel', serif;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    table thead {
      background: rgba(200, 155, 60, 0.05);
    }

    table th {
      padding: 15px 20px;
      text-align: left;
      color: var(--gold);
      font-weight: 600;
      border-bottom: 1px solid rgba(200, 155, 60, 0.2);
    }

    table td {
      padding: 15px 20px;
      color: var(--text-secondary);
      border-bottom: 1px solid rgba(200, 155, 60, 0.1);
    }

    table tr:hover {
      background: rgba(200, 155, 60, 0.05);
    }

    table tr:last-child td {
      border-bottom: none;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
    }

    .btn-small {
      padding: 6px 12px;
      font-size: 0.85rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
    }

    .btn-edit {
      background: var(--gold);
      color: var(--black-primary);
      border: 1px solid var(--gold);
    }

    .btn-edit:hover {
      background: #d4a844;
      transform: translateY(-1px);
    }

    .btn-delete {
      background: transparent;
      color: var(--red);
      border: 1px solid var(--red);
    }

    .btn-delete:hover {
      background: rgba(214, 59, 30, 0.1);
    }

    .empty-state {
      text-align: center;
      padding: 60px 30px;
      color: var(--text-secondary);
    }

    .empty-state i {
      font-size: 3rem;
      color: var(--gold);
      margin-bottom: 20px;
      opacity: 0.5;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .status-livre {
      background: rgba(0, 200, 100, 0.2);
      color: #00c864;
    }

    .status-ocupada {
      background: rgba(214, 59, 30, 0.2);
      color: #d63b1e;
    }

    .status-reservada {
      background: rgba(200, 155, 60, 0.2);
      color: #c89b3c;
    }

    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--gold);
      text-decoration: none;
      margin-bottom: 20px;
      font-size: 0.95rem;
      transition: all 0.3s;
    }

    .back-button:hover {
      gap: 12px;
    }

    @media (max-width: 768px) {
      .page-header h1 {
        font-size: 2rem;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 0.85rem;
      }

      table th,
      table td {
        padding: 10px 12px;
      }

      .button-group {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page-overlay"></div>

  <header class="topbar">
    <div class="brand">
      <div class="brand-logo">
        <img src="../logo.jpeg" alt="Logo Churrascaria Querência" style="max-width: 50px;">
      </div>
      <div class="brand-copy">
        <span>CHURRASCARIA</span>
        <h1>QUERÊNCIA</h1>
      </div>
    </div>

    <nav class="navbar">
      <ul>
        <li><a href="../index.html"><i class="fas fa-home"></i> Início</a></li>
        <li><a href="../produtos/index.html"><i class="fas fa-drumstick-bite"></i> Produtos</a></li>
        <li><a href="#" class="active"><i class="fas fa-table"></i> Mesas</a></li>
        <li><a href="../pedidos/index.html"><i class="fas fa-clipboard"></i> Pedidos</a></li>
        <li><a href="#"><i class="fas fa-chart-line"></i> Relatórios</a></li>
      </ul>
    </nav>
  </header>

  <div class="page-content">
    <a href="../index.html" class="back-button">
      <i class="fas fa-arrow-left"></i> Voltar
    </a>

    <div class="page-header">
      <h1>Gerenciar Mesas</h1>
      <p>Cadastre, edite e controle o status de todas as mesas</p>
    </div>

    <!-- Formulário -->
    <div class="form-container">
      <h2><i class="fas fa-plus-circle"></i> Nova Mesa</h2>
      <form id="formMesa">
        <div class="form-row">
          <div class="form-group">
            <label for="numeroMesa">Número da Mesa</label>
            <input type="number" id="numeroMesa" placeholder="Ex: 5" required>
          </div>
          <div class="form-group">
            <label for="lugaresMesa">Quantidade de Lugares</label>
            <input type="number" id="lugaresMesa" placeholder="Ex: 4" required>
          </div>
          <div class="form-group">
            <label for="statusMesa">Status</label>
            <select id="statusMesa" required>
              <option value="">Selecione...</option>
              <option value="Livre">Livre</option>
              <option value="Ocupada">Ocupada</option>
              <option value="Reservada">Reservada</option>
            </select>
          </div>
        </div>
        <div class="button-group">
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i> Salvar Mesa
          </button>
          <button type="reset" class="btn btn-secondary">
            <i class="fas fa-redo"></i> Limpar
          </button>
        </div>
      </form>
    </div>

    <!-- Tabela de Mesas -->
    <div class="table-container">
      <div class="table-header">
        <h2><i class="fas fa-list"></i> Mesas Cadastradas</h2>
      </div>
      <div id="tabelaMesas">
        <div class="empty-state">
          <i class="fas fa-inbox"></i>
          <p>Nenhuma mesa cadastrada ainda</p>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer-bar">
    <div class="footer-inner">
      <span class="footer-icon">
        <i class="fas fa-fire"></i>
      </span>
      <p>© 2026 - Sistema de Controle de Restaurante | Cristian & João</p>
    </div>
  </footer>

  <script src="../script.js"></script>
  <script>
    let editandoId = null;

    function carregarTabela() {
      const mesas = listarMesas();
      const tabelaDiv = document.getElementById('tabelaMesas');

      if (mesas.length === 0) {
        tabelaDiv.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-inbox"></i>
            <p>Nenhuma mesa cadastrada ainda</p>
          </div>
        `;
        return;
      }

      let html = `
        <table>
          <thead>
            <tr>
              <th>Mesa</th>
              <th>Lugares</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody>
      `;

      mesas.forEach(mesa => {
        const badgeClass = `status-${mesa.status.toLowerCase()}`;
        html += `
          <tr>
            <td>#${mesa.numero}</td>
            <td>${mesa.lugares}</td>
            <td><span class="status-badge ${badgeClass}">${mesa.status}</span></td>
            <td>
              <div class="action-buttons">
                <button class="btn-small btn-edit" onclick="editarMesaUI(${mesa.id})">
                  <i class="fas fa-edit"></i> Editar
                </button>
                <button class="btn-small btn-delete" onclick="apagarMesa(${mesa.id})">
                  <i class="fas fa-trash"></i> Apagar
                </button>
              </div>
            </td>
          </tr>
        `;
      });

      html += `
          </tbody>
        </table>
      `;

      tabelaDiv.innerHTML = html;
    }

    document.getElementById('formMesa').addEventListener('submit', (e) => {
      e.preventDefault();

      const numero = parseInt(document.getElementById('numeroMesa').value);
      const lugares = parseInt(document.getElementById('lugaresMesa').value);
      const status = document.getElementById('statusMesa').value;

      if (editandoId) {
        editarMesa(editandoId, { numero, lugares, status });
        alert('✅ Mesa atualizada com sucesso!');
        editandoId = null;
      } else {
        adicionarMesa({ numero, lugares });
        alterarStatusMesa(app.mesas[app.mesas.length - 1].id, status);
        alert('✅ Mesa adicionada com sucesso!');
      }

      document.getElementById('formMesa').reset();
      document.querySelector('.form-container h2').innerHTML = '<i class="fas fa-plus-circle"></i> Nova Mesa';
      carregarTabela();
    });

    function editarMesaUI(id) {
      const mesas = listarMesas();
      const mesa = mesas.find(m => m.id === id);

      if (mesa) {
        document.getElementById('numeroMesa').value = mesa.numero;
        document.getElementById('lugaresMesa').value = mesa.lugares;
        document.getElementById('statusMesa').value = mesa.status;

        editandoId = id;
        document.querySelector('.form-container h2').innerHTML = `<i class="fas fa-edit"></i> Editar Mesa`;
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function apagarMesa(id) {
      if (confirm('Tem certeza que deseja apagar esta mesa?')) {
        removerMesa(id);
        alert('✅ Mesa apagada com sucesso!');
        carregarTabela();
      }
    }

    carregarTabela();
  </script>
</body>
</html>
